<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>望年会 申込者リスト（幹事用）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Zen+Old+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f1e6; --card:#fffdf7; --ink:#2c2722; --ink-soft:rgba(58,50,42,0.7);
    --gold:#b8934e; --gold-2:#a07d3c; --gold-line:rgba(184,147,78,0.42);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Zen Old Mincho', serif;
    background:var(--bg); color:var(--ink);
    padding:40px 18px 80px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px; margin:0 auto;}
  .eyebrow{
    font-family:'Playfair Display', serif; font-style:italic;
    font-size:15px; letter-spacing:0.2em; color:var(--gold-2);
    text-align:center; margin-bottom:8px;
  }
  h1{
    font-weight:600; font-size:22px; letter-spacing:0.2em;
    text-align:center; margin-bottom:6px;
  }
  .sub{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:12px; color:var(--ink-soft); text-align:center; margin-bottom:30px;
  }
  .bar{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px; gap:10px; flex-wrap:wrap;
  }
  .count{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:13px; color:var(--ink-soft);
  }
  .csv-btn{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:13px; letter-spacing:0.06em;
    padding:10px 22px;
    background:var(--card); color:var(--gold-2);
    border:1px solid var(--gold); cursor:pointer;
    transition:all 180ms;
  }
  .csv-btn:hover{ background:#fff; color:var(--ink); }
  .table-wrap{
    background:var(--card);
    border:1px solid var(--gold-line);
    box-shadow:0 18px 48px rgba(120,95,55,0.12);
    overflow-x:auto;
  }
  table{ width:100%; border-collapse:collapse; min-width:680px; }
  th{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:11px; letter-spacing:0.18em; font-weight:500;
    color:var(--gold-2); text-align:left;
    padding:14px 14px 10px;
    border-bottom:1px solid var(--gold-line);
    white-space:nowrap;
  }
  td{
    font-size:13.5px; padding:13px 14px;
    border-bottom:1px solid rgba(184,147,78,0.16);
    white-space:nowrap;
  }
  tr:last-child td{ border-bottom:none; }
  .num{ color:var(--gold-2); font-family:'Playfair Display', serif; }
  .empty{
    padding:60px 20px; text-align:center;
    font-size:13.5px; color:var(--ink-soft); line-height:2;
  }
  .note{
    margin-top:18px;
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:11.5px; line-height:1.9; color:var(--ink-soft);
  }
  @media print{
    .csv-btn, .note{ display:none; }
    body{ background:#fff; padding:10mm; }
    .table-wrap{ box-shadow:none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Guest List</p>
  <h1>申込者リスト</h1>
  <p class="sub">望年会 2026.12.18 ｜ 幹事用・受付名簿（お客様からは見えません）</p>

  <div class="bar">
    <span class="count" id="count">読み込み中…</span>
    <button class="csv-btn" id="csv-btn">CSVで保存（Excel用）</button>
  </div>

  <div class="table-wrap">
    <table id="tbl">
      <thead>
        <tr>
          <th>No.</th><th>お名前</th><th>よみがな</th><th>メール</th><th>電話番号</th><th>Instagram</th><th>申込日時</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none;">
      まだお申し込みはありません。<br>
      招待状からお申し込みが入ると、ここに自動で並びます。
    </div>
  </div>

  <p class="note">
    ・このページは閲覧専用です（お客様側から書き換えることはできません）。<br>
    ・「CSVで保存」を押すとExcelで開けるファイルがダウンロードされ、お手元に保管できます。<br>
    ・印刷すればそのまま受付名簿として使えます（ブラウザの印刷ボタンでOK）。
  </p>
</div>

<script>
(async function(){
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  const count = document.getElementById('count');
  let rows = [];

  function fmt(ts){
    const d = new Date(ts);
    const p = n=>String(n).padStart(2,'0');
    return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
  }

  async function fetchRows(){
    let key = sessionStorage.getItem('bonenkai-admin-key') || '';
    for(let attempt=0; attempt<3; attempt++){
      if(!key){
        key = prompt('管理用パスワードを入力してください') || '';
        if(!key) return null;
      }
      try{
        const r = await fetch('/api/admin-list?key=' + encodeURIComponent(key));
        if(r.status === 401){ alert('パスワードが違います。'); key=''; continue; }
        if(!r.ok) throw new Error('http ' + r.status);
        sessionStorage.setItem('bonenkai-admin-key', key);
        const data = await r.json();
        return data.signups || [];
      }catch(e){
        // ローカル確認用（APIが無い環境）はこの端末の控えを表示
        console.warn('admin api unavailable, falling back to local', e);
        return JSON.parse(localStorage.getItem('bonenkai-signups') || '[]');
      }
    }
    return null;
  }

  const fetched = await fetchRows();
  if(fetched === null){ count.textContent = '未認証'; empty.style.display='block'; document.getElementById('tbl').style.display='none'; return; }
  rows = fetched;

  if(!rows.length){
    empty.style.display = 'block';
    document.getElementById('tbl').style.display = 'none';
    count.textContent = '申込 0件';
  } else {
    rows.sort((a,b)=>a.ts-b.ts).forEach((r,i)=>{
      const tr = document.createElement('tr');
      const cells = [i+1, r.name||'', r.kana||'', r.email||'', r.tel||'', r.insta||'', fmt(r.ts)];
      cells.forEach((c,ci)=>{
        const td = document.createElement('td');
        if(ci===0) td.className='num';
        td.textContent = c;
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    count.textContent = '申込 ' + rows.length + '件';
  }

  document.getElementById('csv-btn').addEventListener('click', ()=>{
    const head = ['No.','お名前','よみがな','メール','電話番号','Instagram','申込日時'];
    const lines = [head.join(',')];
    rows.forEach((r,i)=>{
      const esc = v => '"' + String(v||'').replace(/"/g,'""') + '"';
      lines.push([i+1, esc(r.name), esc(r.kana), esc(r.email), esc(r.tel), esc(r.insta), esc(fmt(r.ts))].join(','));
    });
    const bom = '﻿';
    const blob = new Blob([bom + lines.join('\r\n')], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '望年会_申込者リスト.csv';
    a.click();
  });
})();
</script>
</body>
</html>
